<!doctype html>
<html>
<head>
	<title>Sudoku Solver</title>
	<link rel="stylesheet" href="sudoku.css" />

	<script src="http://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
	<script src="http://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.7.0/underscore-min.js"></script>
	<script src="puzzles.js"></script>
	<script src="solver.js"></script>
	<script src="board.js"></script>
	<script src="grid.js"></script>
</head>

<body>
	<a href="https://en.wikipedia.org/wiki/Glossary_of_Sudoku" target="_blank">Glossary</a>
	<div id="board"></div>

	<script type="text/javascript">
		(function () {
			var $board = $('#board');

			var puzzle = randomPuzzle('evil');

			var grid = new Grid(puzzle);

			grid.toString();

			var board = new Board($board);

			board.setupUI();

			board.setPuzzle(puzzle);

			// TODO WFH Refactor solver.js.

			var start = new Date();

			var complete = solvePuzzle(_.flatten(puzzle), grid);

			var finished = new Date();

			grid.toString();

			console.log(start);
			console.log(finished);
			console.log('Time elapsed (in microseconds):', finished - start);

			if (puzzleNotSolved(_.flatten(complete))) {
				console.log('Puzzle NOT solved.');
			} else {
				console.log('Puzzle solved!');

				// A trivial animation to indicate the puzzle is solved.
				// $board.addClass('solved');
			}

			board.printPuzzle(complete);
		})();
	</script>
</body>
</html>
